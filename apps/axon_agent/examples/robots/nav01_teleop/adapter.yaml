adapter_id: nav01_teleop
robot_model: nav01
library: libaxon_nav01_teleop.so
abi_version: 1
entry_symbol: axon_agent_create_adapter
auto_start: false
capabilities:
  - startup_program
  - health_report

managed_processes:
  robot_startup:
    executable: /home/nav01/start_teleop.sh
    working_directory: /home/nav01
    env:
      HOME: /home/nav01
      USER: nav01
      LOGNAME: nav01
      SHELL: /bin/bash
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PATH: /snap/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      AXON_PROFILE: nav01_teleop
