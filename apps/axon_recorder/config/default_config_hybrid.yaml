# Hybrid recording: ROS2 + UDP JSON into a single MCAP file.
# Build/install plugin paths on your machine (examples below are placeholders).
#
# Usage:
#   ./axon_recorder --config config/default_config_hybrid.yaml

# Ordered plugin list — required for hybrid (ROS middleware first is typical).
plugins:
  - path: "/usr/local/lib/axon/plugins/libaxon_ros2_plugin.so"
  - path: "/usr/local/lib/axon/plugins/libaxon_udp.so"

ros2:
  # 0 = auto: min(number of subscribed ROS topics, CPU cores), minimum 2.
  # Set to 1 to force the old effectively single-threaded behavior.
  executor_threads: 0

dataset:
  path: /tmp/axon/recording
  output_file: recording.mcap
  queue_size: 8192

recording:
  profile: ros2
  compression: zstd
  compression_level: 3
  writer_batch:
    enabled: true
    max_messages: 256
    max_bytes_mb: 8
    flush_interval_ms: 20
    queue_capacity: 4096
  max_disk_usage_gb: 100
  disk_usage:
    enabled: true
    warn_usage_gb: 80
    hard_limit_gb: 100
    max_task_size_gb: 0
    physical_safety_margin_gb: 2
    physical_check_interval_ms: 1000
    physical_check_interval_gb: 0.5
    cleanup_enabled: false
    cleanup_target_gb: 80
    cleanup_min_age_sec: 3600
    cleanup_upload_backlog: false
  sidecar:
    enabled: true
    mode: always          # always, transient, or none

metadata:
  incident_bundle:
    enabled: false
    directory: ""

# Subscribe to ROS topics and UDP-backed JSON channels (per udp.streams below).
subscriptions:
  - name: /imu/data
    message_type: sensor_msgs/msg/Imu
    batch_size: 500
    flush_interval_ms: 1000
  - name: /udp/gps
    message_type: axon_udp/json
    batch_size: 1
    flush_interval_ms: 100
  - name: /udp/can
    message_type: axon_udp/json
    batch_size: 1
    flush_interval_ms: 100

udp:
  enabled: true
  bind_address: "0.0.0.0"
  buffer_size: 65536
  timestamp_extraction:
    source: "field"
    field: "timestamp"
  streams:
    - name: "gps"
      port: 4242
      topic: "/udp/gps"
      enabled: true
    - name: "can_bridge"
      port: 4243
      topic: "/udp/can"
      enabled: true

rpc:
  mode: http_server
  ws_client:
    url: ws://localhost:8090/rpc
    auth_token: ""
    reconnect_initial_delay_ms: 1000
    reconnect_backoff_multiplier: 2.0
    reconnect_max_delay_ms: 60000
    reconnect_jitter_factor: 0.2
    ping_interval_ms: 30000
    ping_timeout_ms: 10000
    time_gap_check_enabled: true
    time_gap_warning_threshold_ms: 1000
    time_gap_critical_threshold_ms: 5000
    time_gap_max_round_trip_ms: 2000
    time_gap_stale_after_ms: 60000

http_server:
  host: "0.0.0.0"
  port: 8765
